<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oratio - Autenticação TikTok</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; color: #333; text-align: center; }
    h1 { color: #5a3e8c; }
    .code-box { background: #f4f0ff; border: 2px solid #c0a8e8; border-radius: 8px; padding: 20px; margin: 30px 0; word-break: break-all; font-family: monospace; font-size: 0.95em; text-align: left; }
    .label { font-weight: bold; color: #7a5ab5; margin-bottom: 8px; }
    .copy-btn { background: #7a5ab5; color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 1em; margin-top: 10px; }
    .copy-btn:hover { background: #5a3e8c; }
    .error { color: #c0392b; background: #fdecea; border: 1px solid #f5c6cb; border-radius: 6px; padding: 15px; }
  </style>
</head>
<body>
  <h1>🙏 Oratio</h1>
  <h2>Autenticação TikTok</h2>
  <div id="content"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const state = params.get("state");
    const error = params.get("error");
    const el = document.getElementById("content");

    if (error) {
      el.innerHTML = `<div class="error"><strong>Erro:</strong> ${error}<br>${params.get("error_description") || ""}</div>`;
    } else if (code) {
      el.innerHTML = `
        <p>✅ Autorização concluída! Copie o código abaixo e cole no terminal:</p>
        <div class="code-box">
          <div class="label">Authorization Code:</div>
          <div id="code-text">${code}</div>
        </div>
        <button class="copy-btn" onclick="navigator.clipboard.writeText('${code}').then(()=>this.textContent='Copiado ✓')">Copiar Código</button>
        ${state ? `<div class="code-box"><div class="label">State:</div><div>${state}</div></div>` : ""}
        <p style="margin-top:30px;color:#888;font-size:0.9em;">Pode fechar esta aba após copiar o código.</p>
      `;
    } else {
      el.innerHTML = `<p style="color:#888;">Nenhum parâmetro recebido. Esta página é usada como callback OAuth do TikTok.</p>`;
    }
  </script>
</body>
</html>
